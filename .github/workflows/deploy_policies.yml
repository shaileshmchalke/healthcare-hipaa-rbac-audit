# =============================================================================
# FILE: .github/workflows/deploy_policies.yml
# PURPOSE: CI/CD pipeline - Static validation only (portfolio project)
# VERSION: 1.4
# =============================================================================

name: Deploy Snowflake HIPAA Policies

on:
  push:
    branches: [ main ]
    paths:
      - 'sql/**.sql'
      - 'policies_example.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'sql/**.sql'
      - 'policies_example.yaml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Static Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML policy file syntax
        run: |
          python3 -c "
          import yaml
          with open('policies_example.yaml') as f:
              yaml.safe_load(f)
          print('PASS: policies_example.yaml is valid YAML')
          "

      - name: Check for hardcoded credentials in SQL files
        run: |
          echo "Scanning SQL files for hardcoded secrets..."
          FOUND=0
          for pattern in "password\s*=" "aws_secret_access_key" "private_key\s*="; do
            result=$(grep -rniE "$pattern" sql/ --include="*.sql" \
                     | grep -vE ":[[:space:]]*--" || true)
            if [ -n "$result" ]; then
              echo "FAIL: Possible hardcoded credential - pattern: $pattern"
              echo "$result"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "PASS: No hardcoded credentials found in SQL files"
          else
            exit 1
          fi

      - name: Check for real PHI data patterns in SQL files
        run: |
          echo "Scanning for real SSN patterns in active SQL code only..."
          FOUND=0
          while IFS= read -r -d '' file; do
            result=$(grep -nE '\b[0-9]{3}-[0-9]{2}-[0-9]{4}\b' "$file" \
                     | grep -vE ":[[:space:]]*--" \
                     | grep -vE "^\s*[0-9]+:--" || true)
            if [ -n "$result" ]; then
              echo "FAIL: Possible real SSN in $file"
              echo "$result"
              FOUND=1
            fi
          done < <(find sql/ -name "*.sql" -print0)
          if [ $FOUND -eq 0 ]; then
            echo "PASS: No real SSN patterns found in active SQL code"
          else
            exit 1
          fi

      - name: Validate SQL file headers
        run: |
          echo "Checking SQL file headers..."
          for f in sql/setup_rbac.sql sql/policies.sql sql/audit_tables.sql sql/validation_queries.sql; do
            if ! head -5 "$f" | grep -q "PURPOSE:"; then
              echo "WARNING: Missing PURPOSE header in $f"
            else
              echo "PASS: $f has proper header"
            fi
          done

      - name: Validation summary
        run: |
          echo "================================================"
          echo "Static Validation complete - all checks passed."
          echo "Repository: HIPAA-compliant Snowflake architecture"
          echo "SQL files:  clean, no PHI, no hardcoded secrets"
          echo "YAML:       valid syntax"
          echo "================================================"
