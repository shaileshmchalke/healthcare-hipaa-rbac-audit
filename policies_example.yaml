# =============================================================================
# AUDIT CONFIGURATION
# =============================================================================
audit:
  phi_access_log:
    database: AUDIT_DB
    schema: PUBLIC
    table: phi_access_log
    retention_snowflake_days: 90
    retention_s3_years: 7
    s3_bucket: "${AUDIT_S3_BUCKET}"     # Injected from deployment secrets
    s3_prefix: "phi_access_log"
    s3_object_lock_mode: COMPLIANCE     # S3 Object Lock in COMPLIANCE mode = WORM
    archival_schedule: "0 3 1 * *"     # Monthly, 1st at 3 AM UTC

  dlp_monitoring:
    schedule: "*/15 * * * *"           # Every 15 minutes
    warehouse: AUDIT_WH
    thresholds:
      bulk_export_rows: 50000           # Rows in 15 minutes = flag as suspicious
      off_hours_start: 22               # 10 PM (hospital local time)
      off_hours_end: 6                  # 6 AM
      min_queries_for_off_hours_flag: 3 # Only flag if 3+ queries (not just 1 login test)
    alerts:
      high_severity:
        - channel: pagerduty
          team: security_oncall
      medium_severity:
        - channel: slack
          channel_id: "#hipaa-security-alerts"
      low_severity:
        - channel: email
          recipients:
            - "hipaa-officer@mwhealthnet.org"

  validation:
    schedule: "0 6 * * 1"             # Every Monday at 6 AM UTC
    warehouse: AUDIT_WH
    alert_on_failure: true
    alert_recipients:
      - "hipaa-officer@mwhealthnet.org"
      - "data-platform-lead@mwhealthnet.org"


# =============================================================================
# DEPLOYMENT PIPELINE CONFIGURATION
# =============================================================================
deployment:
  require_ticket_for_phi_changes: true
  require_two_approvals_for_hipaa_officer_changes: true
  auto_rollback_on_validation_failure: true
  post_deploy_validation_script: "sql/validation_queries.sql"
  environments:
    production:
      snowflake_account_env_var: SF_PROD_ACCOUNT
      requires_cab_approval: true
    qa:
      snowflake_account_env_var: SF_QA_ACCOUNT
      requires_cab_approval: false
      uses_synthetic_data: true       # QA never uses real PHI — synthetic data only