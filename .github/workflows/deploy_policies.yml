# =============================================================================
# FILE: .github/workflows/deploy_policies.yml
# PURPOSE: CI/CD pipeline for Snowflake HIPAA security policy deployment
# VERSION: 1.2
#
# REQUIRED GITHUB SECRETS (Settings -> Secrets and variables -> Actions):
#   SNOWSQL_ACCOUNT     : e.g., xy12345.us-east-1
#   SNOWSQL_USER        : e.g., deploy_svc_account
#   SNOWSQL_PRIVATE_KEY : RSA private key PEM content (for key-pair auth)
# =============================================================================

name: Deploy Snowflake HIPAA Policies

on:
  push:
    branches: [ main ]
    paths:
      - 'sql/setup_rbac.sql'
      - 'sql/policies.sql'
      - 'sql/audit_tables.sql'
      - 'policies_example.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'sql/**.sql'
      - 'policies_example.yaml'

env:
  SNOWSQL_VERSION: '1.2.24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Static Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML policy file syntax
        run: |
          python3 -c "
          import yaml
          with open('policies_example.yaml') as f:
              yaml.safe_load(f)
          print('PASS: policies_example.yaml is valid YAML')
          "

      - name: Check for hardcoded credentials in SQL files
        run: |
          echo "Scanning SQL files for hardcoded secrets..."
          FOUND=0
          for pattern in "password\s*=" "aws_secret_access_key" "private_key\s*=" "api_key\s*="; do
            result=$(grep -rniE "$pattern" sql/ --include="*.sql" \
                     | grep -vE ":[[:space:]]*--" || true)
            if [ -n "$result" ]; then
              echo "FAIL: Possible hardcoded credential - pattern: $pattern"
              echo "$result"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "PASS: No hardcoded credentials found in SQL files"
          else
            exit 1
          fi

      - name: Check for real PHI data patterns in SQL files
        run: |
          echo "Scanning for real SSN patterns in active SQL code only..."
          FOUND=0
          while IFS= read -r -d '' file; do
            result=$(grep -nE '\b[0-9]{3}-[0-9]{2}-[0-9]{4}\b' "$file" \
                     | grep -vE ":[[:space:]]*--" \
                     | grep -vE "^\s*[0-9]+:--" || true)
            if [ -n "$result" ]; then
              echo "FAIL: Possible real SSN in $file (active code line):"
              echo "$result"
              FOUND=1
            fi
          done < <(find sql/ -name "*.sql" -print0)
          if [ $FOUND -eq 0 ]; then
            echo "PASS: No real SSN patterns found in active SQL code"
          else
            exit 1
          fi

      - name: Validate SQL file documentation headers
        run: |
          echo "Checking SQL file headers..."
          for f in sql/setup_rbac.sql sql/policies.sql sql/audit_tables.sql sql/validation_queries.sql; do
            if ! head -5 "$f" | grep -q "PURPOSE:"; then
              echo "WARNING: Missing PURPOSE header in $f"
            else
              echo "PASS: $f has proper header"
            fi
          done

  deploy:
    name: Deploy to Production
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SnowSQL CLI
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-${{ env.SNOWSQL_VERSION }}-linux_x86_64.bash
          bash snowsql-${{ env.SNOWSQL_VERSION }}-linux_x86_64.bash -b -f
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure RSA key-pair authentication
        run: |
          echo "${{ secrets.SNOWSQL_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.pem
          chmod 400 /tmp/snowflake_rsa_key.pem

      - name: Deploy RBAC hierarchy
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER:    ${{ secrets.SNOWSQL_USER }}
        run: |
          snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
            --private-key-path /tmp/snowflake_rsa_key.pem \
            -r SECURITYADMIN -f sql/setup_rbac.sql -o exit_on_error=true
          echo "PASS: RBAC deployed"

      - name: Deploy masking and row-access policies
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER:    ${{ secrets.SNOWSQL_USER }}
        run: |
          snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
            --private-key-path /tmp/snowflake_rsa_key.pem \
            -r SECURITYADMIN -f sql/policies.sql -o exit_on_error=true
          echo "PASS: Policies deployed"

      - name: Deploy audit tables and tasks
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER:    ${{ secrets.SNOWSQL_USER }}
        run: |
          snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
            --private-key-path /tmp/snowflake_rsa_key.pem \
            -r SECURITYADMIN -f sql/audit_tables.sql -o exit_on_error=true
          echo "PASS: Audit tables deployed"

      - name: Post-deploy validation
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER:    ${{ secrets.SNOWSQL_USER }}
        run: |
          snowsql -a "$SNOWSQL_ACCOUNT" -u "$SNOWSQL_USER" \
            --private-key-path /tmp/snowflake_rsa_key.pem \
            -r SECURITYADMIN -f sql/validation_queries.sql -o exit_on_error=true
          echo "PASS: Post-deploy validation complete"

      - name: Remove RSA key from runner
        if: always()
        run: |
          rm -f /tmp/snowflake_rsa_key.pem
          echo "Private key removed from runner"